<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Playlist - PlaylistBridge</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="dark-theme"> <nav class="navbar">
        <div class="logo">PlaylistBridge</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="import.html" class="active">Import</a> </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Import Playlist</h1>
            <p>Paste a link or text to extract songs</p>
        </header>

        <section class="import-section">
            <textarea 
                id="importInput" 
                rows="6" 
                placeholder="Paste Instagram post link, YouTube link, Spotify link, or raw text playlist here..."
                class="form-control"
            ></textarea>
            
            <div class="button-group mt-3">
                <button id="extractBtn" class="btn btn-primary">Extract Playlist</button>
            </div>

            <div id="loadingState" class="hidden mt-2">Extracting... Please wait.</div>
            <div id="errorState" class="error-text hidden mt-2"></div>
        </section>

        <section id="resultsContainer" class="results-grid hidden mt-4">
            </section>
    </main>

    <script src="js/globals.js"></script> <script src="js/parser.js"></script>  <script src="js/app.js"></script>     <script>
        document.addEventListener('DOMContentLoaded', () => {
            const extractBtn = document.getElementById('extractBtn');
            const importInput = document.getElementById('importInput');
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const resultsContainer = document.getElementById('resultsContainer');

            extractBtn.addEventListener('click', async () => {
                const inputVal = importInput.value.trim();
                if (!inputVal) return;

                // Reset UX states
                errorState.classList.add('hidden');
                resultsContainer.classList.add('hidden');
                loadingState.classList.remove('hidden');
                extractBtn.disabled = true;

                try {
                    let extractedText = inputVal;

                    // 1. Detect Instagram URL (post or reel)
                    const isInstagram = /https?:\/\/(www\.)?instagram\.com\/(p|reel)\/[a-zA-Z0-9_-]+/.test(inputVal);
                    
                    if (isInstagram) {
                        // Call Netlify function
                        const response = await fetch('/.netlify/functions/instagram', {
                            method: 'POST', // Assuming POST, adjust to GET if needed
                            body: JSON.stringify({ url: inputVal }),
                            headers: { 'Content-Type': 'application/json' }
                        });
                        
                        if (!response.ok) throw new Error('Failed to extract caption from Instagram.');
                        
                        const data = await response.json();
                        // Adjust 'data.caption' based on what your Netlify function actually returns
                        extractedText = data.caption || data.text; 
                    } 
                    // Note: If YouTube/Spotify URLs need specific API calls before parsing, 
                    // add an `else if (isYouTube(inputVal))` block here utilizing getSearchLink.

                    // 2. Parse text/caption using existing parser logic
                    // Replace 'parsePlaylistText' with whatever your global parsing function is named
                    const songs = window.parsePlaylistText ? window.parsePlaylistText(extractedText) : []; 

                    if (!songs || songs.length === 0) {
                        throw new Error('No songs could be extracted. Please check your link or text.');
                    }

                    // 3. Render Output (Cards, InstantPlay, Save) using existing integration
                    if (window.generateFromSongs) {
                        resultsContainer.innerHTML = ''; // Clear previous results
                        resultsContainer.classList.remove('hidden');
                        
                        // Assumes generateFromSongs handles the UI rendering and hooks up PlayerBridge
                        window.generateFromSongs(songs, resultsContainer); 
                    } else {
                        throw new Error("Core rendering function (generateFromSongs) is missing.");
                    }

                } catch (error) {
                    console.error("Extraction error:", error);
                    errorState.textContent = error.message || "An error occurred during extraction.";
                    errorState.classList.remove('hidden');
                } finally {
                    loadingState.classList.add('hidden');
                    extractBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
