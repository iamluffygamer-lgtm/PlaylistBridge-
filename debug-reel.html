<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Reel Detector</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: monospace;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        input {
            background: #2a2a2a;
            color: white;
        }
        button {
            background: #6200ee;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .debug-box {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
            border-left: 4px solid #bb86fc;
        }
        .success { color: #03dac6; }
        .error { color: #cf6679; }
    </style>
</head>
<body>
    <h2>🔧 Debug Reel Detector</h2>
    <p>Testing function at: <code>https://playlistbridge.netlify.app/.netlify/functions/reelSong</code></p>
    
    <input type="url" id="reelUrl" placeholder="Paste Instagram Reel URL" value="https://www.instagram.com/reel/Cx0H1W5oZ8L/">
    
    <button onclick="testConnection()">1. Test Function Connection</button>
    <button onclick="detectSong()">2. Detect Song</button>
    
    <div id="result" class="debug-box">
        Click a button to start...
    </div>

    <script>
    const resultDiv = document.getElementById('result');
    
    function log(message, type = 'info') {
        const color = type === 'error' ? '#cf6679' : type === 'success' ? '#03dac6' : '#bb86fc';
        resultDiv.innerHTML += `<div style="color: ${color}; margin: 5px 0;">${message}</div>`;
        resultDiv.scrollTop = resultDiv.scrollHeight;
    }
    
    async function testConnection() {
        resultDiv.innerHTML = '';
        log('🔍 Testing connection to function...');
        
        try {
            // Test if function exists (OPTIONS request)
            const optionsResponse = await fetch('https://playlistbridge.netlify.app/.netlify/functions/reelSong', {
                method: 'OPTIONS'
            });
            log(`OPTIONS request: ${optionsResponse.status} ${optionsResponse.statusText}`, 'success');
            
            // Test POST with simple data
            const testResponse = await fetch('https://playlistbridge.netlify.app/.netlify/functions/reelSong', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reelUrl: 'https://www.instagram.com/reel/test/' })
            });
            
            log(`POST request: ${testResponse.status} ${testResponse.statusText}`, 'success');
            
            const text = await testResponse.text();
            log(`Raw response: ${text}`, text.includes('error') ? 'error' : 'success');
            
            try {
                const json = JSON.parse(text);
                log(`Parsed JSON: ${JSON.stringify(json, null, 2)}`, 'success');
            } catch (e) {
                log(`JSON parse error: ${e.message}`, 'error');
            }
            
        } catch (error) {
            log(`Connection failed: ${error.message}`, 'error');
        }
    }
    
    async function detectSong() {
        const url = document.getElementById('reelUrl').value;
        if (!url) {
            log('Please enter a URL', 'error');
            return;
        }
        
        resultDiv.innerHTML = '';
        log(`🔍 Testing with URL: ${url}`);
        
        try {
            const response = await fetch('https://playlistbridge.netlify.app/.netlify/functions/reelSong', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reelUrl: url })
            });
            
            log(`Response status: ${response.status} ${response.statusText}`, 'success');
            
            const text = await response.text();
            log(`Raw response text (first 200 chars): ${text.substring(0, 200)}`, 'info');
            
            if (!text) {
                log('❌ Empty response from server', 'error');
                return;
            }
            
            try {
                const data = JSON.parse(text);
                log(`✅ Parsed JSON:`, 'success');
                log(JSON.stringify(data, null, 2), 'success');
                
                if (data.song) {
                    log(`🎵 SONG DETECTED: ${data.song}`, 'success');
                } else {
                    log(`❌ No song detected: ${data.error || 'Unknown error'}`, 'error');
                }
                
            } catch (e) {
                log(`❌ JSON parse error: ${e.message}`, 'error');
                log(`Raw response was not valid JSON`, 'error');
            }
            
        } catch (error) {
            log(`❌ Fetch error: ${error.message}`, 'error');
        }
    }
    </script>
</body>
  </html>
